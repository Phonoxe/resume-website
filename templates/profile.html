<!-- templates/profile.html -->
{% extends "base.html" %}

{% block title %}{{ user.info.name }}'s Profile{% endblock %}

{% block content %}
    <h1>This is your profile, {{ user.info.name }}!</h1>

    {% if user.info.coordinate %}
        <p>Email: {{ user.info.coordinate.email }}</p>
    {% endif %}

    <a href="/modify_name?id={{ user.id }}"><button>Modify your name</button></a>
{% endblock %}
