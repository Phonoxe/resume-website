<!-- templates/profile.html -->
{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">Profile :</h2>
    <hr class="card-divider">

    <div class="form-group">
        <label>Name :</label>
        <p class="readonly-field" id="name"></p>
    </div>
    
    <div class="form-group">
        <label>email :</label>
        <p class="readonly-field" id="email"></p>
    </div>

    <!-- Maintain fidelity to data fetching, not adding fake password row. -->

    <div class="btn-container" style="justify-content: space-between;">
        <button onclick="window.location.href='/modify_name'">Modify your name</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<script>
    async function loadProfile() {
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "/login"; // redirect if not logged in
            return;
        }

        const response = await fetch("/me", {
            headers: { "Authorization": `Bearer ${token}` }
        });

        if (!response.ok) {
            window.location.href = "/login"; // token expired or invalid
            return;
        }

        const user = await response.json();
        document.getElementById("name").innerText = user.info.name;
        document.getElementById("email").innerText = user.info.coordinate.email;
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "/login";
    }

    loadProfile();
</script>
{% endblock %}
