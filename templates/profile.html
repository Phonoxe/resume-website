<!-- templates/profile.html -->
{% extends "base.html" %}

{% block content %}
    <h1>Your profile</h1>
    <p id="name"></p>
    <p id="email"></p>
    <button onclick="logout()">Logout</button>
    <button onclick="window.location.href='/modify_name'">Modify your name</button>

    <script>
        async function loadProfile() {
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "/login"; // redirect if not logged in
                return;
            }

            const response = await fetch("/me", {
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (!response.ok) {
                window.location.href = "/login"; // token expired or invalid
                return;
            }

            const user = await response.json();
            document.getElementById("name").innerText = user.info.name;
            document.getElementById("email").innerText = user.info.coordinate.email;
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/login";
        }

        loadProfile();
    </script>
{% endblock %}
