<!-- templates/modify_name.html -->
{% extends "base.html" %}

{% block title %}Modify Name{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Modify your name :</h2>
    <hr class="card-divider">
    <form id="nameForm" onsubmit="submitForm(); return false;">
        <div class="form-group">
            <label for="newName">Name :</label>
            <input type="text" id="newName" placeholder="Enter your new name" required>
        </div>
        <div class="btn-container">
            <button type="submit">Confirm</button>
        </div>
    <p id="feedback"></p>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    async function submitForm() {
        const newName = document.getElementById("newName").value;
        const token = localStorage.getItem("token");
        const response = await fetch(`/modify_user_name?id=${id}&name=${newName}`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });
        if (response.ok) {
            window.location.href = `/profile?id=${id}`;
        } else {
            document.getElementById("feedback").innerText = "Something went wrong.";
        }
    }
</script>
{% endblock %}
