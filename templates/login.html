{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">Login :</h2>
    <hr class="card-divider">
    
    <div class="form-group">
        <label for="email">email :</label>
        <input type="email" id="email" placeholder="TextInput">
    </div>
    
    <div class="form-group">
        <label for="password">password :</label>
        <input type="password" id="password" placeholder="TextInput">
    </div>

    <div class="btn-container">
        <button type="button" onclick="submitForm()">Login</button>
    </div>
    <p id="feedback"></p>
</div>

<script>
    async function submitForm() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        // /token expects form data, not JSON
        const formData = new URLSearchParams();
        formData.append("username", email);
        formData.append("password", password);

        const response = await fetch("/token", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: formData
        });

        if (response.ok) {
            const data = await response.json();
            localStorage.setItem("token", data.access_token); // store token
            window.location.href = "/profile";
        } else {
            document.getElementById("feedback").innerText = "Incorrect email or password.";
        }
    }
</script>
{% endblock %}
