<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}My App{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f8fa;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Layout */
        header {
            background-color: #f7f8fa;
            text-align: center;
            padding: 3rem 0 0 0;
            width: 100%;
        }

        .header-content {
            width: 90%;
            margin: 0 auto;
            border-bottom: 1px solid #d4d4d4;
            padding-bottom: 2rem;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 400;
            margin: 0;
            color: #333;
        }

        /* Main Container */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 3rem 1rem;
        }

        /* Card Component */
        .card {
            background: #fff;
            border: 1px solid #e1e1e1;
            padding: 2.5rem 3rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 400;
            margin: 0 0 0.5rem 0;
            color: #333;
        }

        .card-divider {
            border: none;
            border-bottom: 2px solid #e1e1e1;
            width: 65px;
            margin: 0 0 3.5rem 0;
        }

        /* Form Groups */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-group label {
            width: 100px;
            font-weight: 400;
            color: #333;
            text-align: left;
            margin-right: 1rem;
        }

        .form-group input,
        .form-group .readonly-field {
            flex: 1;
            padding: 0.6rem 0.8rem;
            border: 1px solid #d4d4d4;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            background-color: #fff;
            box-sizing: border-box;
            color: #333;
        }

        .form-group .readonly-field {
            margin: 0;
            min-height: 38px;
            display: flex;
            align-items: center;
            color: #555;
        }

        /* Buttons */
        .btn-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 3.5rem;
        }

        .btn-container-center {
            display: flex;
            justify-content: center;
            margin-top: 6rem;
            gap: 15rem;
        }

        button,
        .btn {
            background-color: #f1f1f1;
            border: 1px solid #d4d4d4;
            padding: 0.6rem 2.5rem;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 4px;
            color: #333;
            transition: all 0.2s;
            font-family: inherit;
        }

        button:hover,
        .btn:hover {
            background-color: #e2e2e2;
        }

        /* Error/Feedback */
        #feedback {
            color: #e74c3c;
            margin-top: 1rem;
            text-align: right;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/">Home</a>
    </nav>
    <header>
        <div class="header-content">
            <h1>Mon site Portfolio</h1>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>

</html>
